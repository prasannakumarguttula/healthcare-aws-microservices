worker_processes auto;

events {
  worker_connections 1024;
}

http {
  include       /etc/nginx/mime.types;
  default_type  application/json;
  sendfile      on;
  keepalive_timeout 65;

  upstream patient_upstream {
    server patient-service:3001;
  }

  upstream appointment_upstream {
    server appointment-service:3002;
  }

  upstream records_upstream {
    server records-service:3003;
  }

  upstream notification_upstream {
    server notification-service:3004;
  }

  server {
    listen 80;
    server_name localhost;

    location = /health {
      default_type application/json;
      return 200 '{"status":"ok","service":"api-gateway","mode":"local"}';
    }

    location = /api/health {
      default_type application/json;
      return 200 '{"status":"ok","service":"api-gateway","mode":"local"}';
    }

    location /patients {
      proxy_pass http://patient_upstream;
      proxy_http_version 1.1;
      proxy_set_header Host $host;
      proxy_set_header X-Request-Id $request_id;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    location /appointments {
      proxy_pass http://appointment_upstream;
      proxy_http_version 1.1;
      proxy_set_header Host $host;
      proxy_set_header X-Request-Id $request_id;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    location /records {
      proxy_pass http://records_upstream;
      proxy_http_version 1.1;
      proxy_set_header Host $host;
      proxy_set_header X-Request-Id $request_id;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    location /notifications {
      proxy_pass http://notification_upstream;
      proxy_http_version 1.1;
      proxy_set_header Host $host;
      proxy_set_header X-Request-Id $request_id;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }
  }
}
